<svg width="512" height="512" viewBox="100 100 312 312" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ribbonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A84FF"/>
      <stop offset="50%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#7B61FF"/>
    </linearGradient>

    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- centering transform -->
  <g transform="translate(-19 83.5)">
    <path d="
      M220 90
      C170 130, 170 210, 240 230
      C330 255, 360 170, 285 135
      C250 120, 230 135, 235 170
      C245 230, 315 240, 380 240
    "
    fill="none"
    stroke="url(#ribbonGradient)"
    stroke-width="36"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#softGlow)"/>
  </g>
</svg>
